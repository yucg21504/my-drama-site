        function changeTab(event, panelId) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function buildTableRows(arr, numColor) {
            const sortedArr = [...arr].sort((a, b) => b.rawValue - a.rawValue);

            return sortedArr.map((item, index) => {
                let badge = `<span class="rank-badge">${index + 1}</span>`;
                if (item.type === 'new' && index >= 5) {
                    badge = `<span class="date-badge hot-badge">NEW</span>`;
                }
                
                const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(item.name + ' 預告')}`;

                // 核心解法：利用 split(' ')[0] 移除後面的 "(演員)"。
                // 這樣一來，連結網址是精準的 /wiki/白鹿_(演員)，但畫面上顯示的依然是純粹乾淨的 "白鹿"。
                const castLinksHTML = item.cast.map(actor => {
                    const wikiUrl = `https://zh.wikipedia.org/wiki/${encodeURIComponent(actor)}`;
                    const displayName = actor.split(' ')[0]; 
                    return `<a href="${wikiUrl}" target="_blank" class="cast-link">${displayName}</a>`;
                }).join('、');

                return `
                    <tr>
                        <td width="10%">${badge}</td>
                        <td width="55%">
                            <a href="${searchUrl}" target="_blank" class="game-link">${item.name}</a>
                            <div class="game-meta">主演：${castLinksHTML}</div>
                        </td>
                        <td width="15%">${item.date}</td>
                        <td width="20%" style="color: ${numColor}; font-weight: bold;">${item.volume}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderAllData() {
            const now = new Date();
            document.getElementById('sync-time').innerText = now.toLocaleString('zh-TW');

            // 渲染台劇
            document.getElementById('tw-new').innerHTML = buildTableRows(mockDatabase.tw.new, '#0288d1');
            document.getElementById('tw-current').innerHTML = buildTableRows(mockDatabase.tw.current, '#4caf50');
            document.getElementById('tw-history').innerHTML = buildTableRows(mockDatabase.tw.history, '#e60012');

            // 渲染陸劇
            document.getElementById('cn-new').innerHTML = buildTableRows(mockDatabase.cn.new, '#0288d1');
            document.getElementById('cn-current').innerHTML = buildTableRows(mockDatabase.cn.current, '#4caf50');
            document.getElementById('cn-history').innerHTML = buildTableRows(mockDatabase.cn.history, '#e60012');

            // 渲染韓劇
            document.getElementById('kr-new').innerHTML = buildTableRows(mockDatabase.kr.new, '#0288d1');
            document.getElementById('kr-current').innerHTML = buildTableRows(mockDatabase.kr.current, '#4caf50');
            document.getElementById('kr-history').innerHTML = buildTableRows(mockDatabase.kr.history, '#e60012');
        }

        const refreshBtn = document.getElementById('refresh-btn');
        const refreshIcon = document.getElementById('refresh-icon');
        const dataContainer = document.getElementById('data-container');

        refreshBtn.addEventListener('click', () => {
            refreshIcon.classList.add('spinning');
            dataContainer.classList.add('loading-shimmer');
            refreshBtn.disabled = true;

            setTimeout(() => {
                renderAllData();
                refreshIcon.classList.remove('spinning');
                dataContainer.classList.remove('loading-shimmer');
                refreshBtn.disabled = false;
            }, 600);
        });

        window.onload = () => { renderAllData(); };
    </script>
